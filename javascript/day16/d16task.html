        let action=()=>{

        }

    <script>
        let cal=()=>{
        let age=document.getElementById("getage").value 
        let h11=document.getElementById("print")

        if(age<12){
            h11.style.display="block"
            h11.textContent="you are a child"
        }else if(age>12 && age<22){
            h11.style.display="block"
            h11.textContent="yoou are youngster"

        }else if(age>22 && age<40){
            h11.style.display="block"
            h11.textContent="you are middle age"

        }else if(age>40){
            h11.style.display="block"
            h11.textContent="you are old age"
        }
    }
        
    </script>

    <button class="h-12 w-30 border border-black-500 bg-black text-white" onclick="switchh()" id="but">darkmodeonoff</button> 
    
    
  
    <script>
           let darker=false
        let switchh=()=>{
            let buton=document.getElementById("but")
            let dark1=document.getElementById("dark")
        
        if(darker===false){
            dark1.classList.remove("bg-white")
            dark1.classList.add("bg-black")
            buton.classList.remove("bg-black","text-white")
            buton.classList.add("bg-white","textblack")

              darker=true
        }
         else{
              dark1.classList.remove("bg-black")
            dark1.classList.add("bg-white")
            buton.classList.remove("bg-white","text-black")
            buton.classList.add("bg-black","text-white")
             darker=false
         }
         
           }
           </script>
