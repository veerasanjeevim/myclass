<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body>
    <script>
        let oncha=()=>{
            let box=document.getElementById("box1")
            let inp1=document.getElementById("inp")
             if(inp1.value ==="show"){
                box.style.display="flex"
                
             }else if(inp1.value==="hide"){
                box.style.display="none"
             }
        }
    </script>
    <div class="h-70 bg-red-200 flex items-center w-70 align-center text-center" style="justify-content: center;" id="box1">
    <h1 >welcome</h1>
    </div>
    <input type="text" id="inp" class="w-30" onchange="oncha()">


</body>

</html>
